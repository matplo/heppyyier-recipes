name: cppyy-cling
version: "6.32.8"
url: ""
build_system: script
make_jobs: 8

build_script: |
  set -e
  echo "[cppyy-cling] Building LLVM + cling from source with $(c++ --version | head -1)"
  echo "[cppyy-cling] The sdist bundles the full LLVM + cling source tree (~13k files)."
  echo "[cppyy-cling] Expect 30-90 min and up to 10 GB temporary disk space."

  # Uninstall the pre-built binary wheel — it ships a cling compiled against a
  # specific Linux environment and is incompatible with GCC 14+ headers.
  pip uninstall -y cppyy cppyy-backend cppyy-cling 2>/dev/null || true

  # Build cppyy-cling from source. The sdist contains the full LLVM + patched
  # cling source. pip triggers a cmake build using the system compiler.
  # STDCXX=17: use C++17 (required; 20 is the default on non-manylinux)
  # MAKE_NPROCS: parallelism for the cmake build
  STDCXX=17 MAKE_NPROCS={n_cores} pip install cppyy-cling=={version} \
      --no-binary cppyy-cling \
      --force-reinstall \
      --no-build-isolation \
      --verbose

  # Verify
  python3 -c "import cppyy_backend, pathlib; lib=pathlib.Path(cppyy_backend.__file__).parent/'lib'; cling=lib/'libCling.so'; print('[cppyy-cling] backend:', cppyy_backend.__file__); print('[cppyy-cling] libCling.so exists:', cling.exists()); assert cling.exists(), 'libCling.so not found'"

  # Write installation info to the heppyyier prefix for registry tracking
  mkdir -p {prefix}
  python3 -c "import cppyy_backend, pathlib; pathlib.Path('{prefix}/.cling_install').write_text(str(pathlib.Path(cppyy_backend.__file__).parent))"
  echo "[cppyy-cling] Build complete."
