name: dpmjet
version: "19.3.7"
url: "https://github.com/DPMJET/DPMJET/archive/refs/tags/v{version}.tar.gz"
build_system: script
verify_binary: dpmjet

build_script: |
  set -e
  # Require a Fortran compiler
  if [ -z "$FC" ]; then
    FC=$(command -v gfortran 2>/dev/null || command -v f77 2>/dev/null || echo "")
  fi
  if [ -z "$FC" ]; then
    echo "[dpmjet] ERROR: no Fortran compiler found — install gfortran (brew install gcc)"
    exit 1
  fi
  export FC
  make -j{n_cores} exe
  mkdir -p {prefix}/bin {prefix}/lib
  # Install the main executable and any companion binaries
  for f in dpmjet dpmjet-*; do
    [ -f "$f" ] && [ -x "$f" ] && cp "$f" {prefix}/bin/ && echo "[dpmjet] installed bin/$f"
  done
  # Install static libraries if present
  find . -maxdepth 2 -name "*.a" -exec cp {} {prefix}/lib/ \; 2>/dev/null || true
