name: roounfold
version: "3.0.5"
url: "https://gitlab.cern.ch/RooUnfold/RooUnfold/-/archive/{version}/RooUnfold-{version}.tar.gz"
build_system: script
depends_on:
  - root
make_jobs: 4

build_script: |
  set -e
  build_dir={srcdir}-build
  mkdir -p "$build_dir"
  cd "$build_dir"
  cmake_opts="-DCMAKE_INSTALL_PREFIX={prefix} -DCMAKE_BUILD_TYPE=Release"
  [ -n "{root_prefix}" ] && cmake_opts="$cmake_opts -DCMAKE_PREFIX_PATH={root_prefix}"
  cmake {srcdir} $cmake_opts
  cmake --build . --target install -- -j{n_cores}

cppyy:
  headers:
    - RooUnfold.h
    - RooUnfoldResponse.h
    - RooUnfoldBayes.h
    - RooUnfoldSvd.h
    - RooUnfoldBinByBin.h
    - RooUnfoldInvert.h
  libraries:
    - RooUnfold
