name: jewel
version: "2.4.0"
url: "https://jewel.hepforge.org/downloads/?f=jewel-{version}.tar.gz"
build_system: script
verify_binary: jewel-2.4.0-vac
depends_on:
  - lhapdf

build_script: |
  set -e
  if ! command -v lhapdf-config >/dev/null 2>&1; then
    echo "[jewel] ERROR: lhapdf-config not found — install lhapdf first (heppyyier install lhapdf)"
    exit 1
  fi
  lhapdf_lib=$(lhapdf-config --libdir)
  echo "[jewel] Using LHAPDF libs: $lhapdf_lib"
  cp Makefile Makefile.orig
  sed -i.bak "s|/path/to/lhapdf|$lhapdf_lib|g" Makefile
  sed -i.bak "s|/home/lhapdf6/install/lib/|$lhapdf_lib/|g" Makefile
  make
  mkdir -p {prefix}/bin {prefix}/settings {prefix}/info
  cp jewel-{version}-* {prefix}/bin/
  cp *.dat {prefix}/settings/
  for f in *.txt README GUIDELINES; do [ -f "$f" ] && cp "$f" {prefix}/info/ || true; done
