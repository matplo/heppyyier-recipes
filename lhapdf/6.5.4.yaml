name: lhapdf
version: "6.5.4"
url: "https://lhapdf.hepforge.org/downloads/?f=LHAPDF-{version}.tar.gz"
build_system: script
make_jobs: 4
verify_binary: lhapdf-config

build_script: |
  set -e

  py_int=$(python -c "import sys; v=sys.version_info; print(v.major*100+v.minor)")
  echo "[lhapdf] Python $(python --version 2>&1 | awk '{print $2}')"

  # On Python>=3.14 the pre-generated lhapdf.cpp uses removed CPython internals
  # (PyDictObject.ma_version_tag, _PyGC_FINALIZED).  Patch them in-place so the
  # file compiles without needing Cython to regenerate it.
  if [ "$py_int" -ge 314 ] && [ -f wrappers/python/lhapdf.cpp ]; then
    echo "[lhapdf] Patching wrappers/python/lhapdf.cpp for Python 3.14+ compatibility"
    python - <<'PYEOF'
import re, sys

path = "wrappers/python/lhapdf.cpp"
with open(path) as f:
    src = f.read()

# 1. Disable dict-version caching macro (uses removed ma_version_tag field)
src = re.sub(
    r'(#define __PYX_GET_DICT_VERSION\(dict\)[ \t]+)\([^)]*ma_version_tag[^)]*\)',
    r'\1(0)',
    src,
)

# 2. Define _PyGC_FINALIZED as a no-op if not already defined
compat = (
    "\n/* heppyyier: Python 3.14 compat — _PyGC_FINALIZED removed */\n"
    "#ifndef _PyGC_FINALIZED\n"
    "#define _PyGC_FINALIZED(o) (0)\n"
    "#endif\n"
)
if "_PyGC_FINALIZED" in src and "heppyyier: Python 3.14 compat" not in src:
    # Insert after the first #include "Python.h"
    src = src.replace('#include "Python.h"', '#include "Python.h"' + compat, 1)

with open(path, "w") as f:
    f.write(src)
print("[lhapdf] lhapdf.cpp patched OK")
PYEOF
  fi

  ./configure --prefix={prefix} --enable-shared --with-python-sys-prefix
  make -j{n_cores}
  make install

cppyy:
  namespace: LHAPDF
  headers:
    - LHAPDF/LHAPDF.h
  libraries:
    - LHAPDF
