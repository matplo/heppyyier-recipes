name: lhapdf
version: "6.5.4"
url: "https://lhapdf.hepforge.org/downloads/?f=LHAPDF-{version}.tar.gz"
build_system: script
make_jobs: 4
verify_binary: lhapdf-config

build_script: |
  set -e

  py_int=$(python -c "import sys; v=sys.version_info; print(v.major*100+v.minor)")
  echo "[lhapdf] Python $(python --version 2>&1 | awk '{print $2}')"

  # On Python>=3.14 the pre-generated lhapdf.cpp uses CPython internals that
  # were removed: PyDictObject.ma_version_tag and _PyGC_FINALIZED.
  # Patch them in-place so the file compiles without needing Cython.
  if [ "$py_int" -ge 314 ] && [ -f wrappers/python/lhapdf.cpp ]; then
    echo "[lhapdf] Patching wrappers/python/lhapdf.cpp for Python 3.14+"
    sed -i.orig 's/#define __PYX_GET_DICT_VERSION(dict).*/#define __PYX_GET_DICT_VERSION(dict) (0)/' wrappers/python/lhapdf.cpp
    python -c "p='wrappers/python/lhapdf.cpp';s=open(p).read();nl=chr(10);dq=chr(34);inc='#include '+dq+'Python.h'+dq;g=nl+'/* py314 */'+nl+'#ifndef _PyGC_FINALIZED'+nl+'#define _PyGC_FINALIZED(o) (0)'+nl+'#endif'+nl;t=s.replace(inc,inc+g,1) if '_PyGC_FINALIZED' in s and '/* py314 */' not in s else s;open(p,'w').write(t)"
    echo "[lhapdf] Patch applied"
  fi

  ./configure --prefix={prefix} --enable-shared --with-python-sys-prefix
  make -j{n_cores}
  make install

cppyy:
  namespace: LHAPDF
  headers:
    - LHAPDF/LHAPDF.h
  libraries:
    - LHAPDF
